<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111417">
<title>RemoteCode</title>
<link rel="stylesheet" href="/static/vendor/xterm.css">
<link rel="stylesheet" href="/static/vendor/hljs-dark.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <aside id="rail">
    <div class="rail-head">
      <span class="brand">◆ RemoteCode</span>
      <button id="settingsBtn" class="btn icon" title="Settings">⚙</button>
      <button id="newBtn" class="btn primary" title="New session">＋</button>
    </div>
    <ul id="sessionList"></ul>
    <div class="rail-foot" id="railFoot">no sessions yet</div>
  </aside>

  <main id="main">
    <header id="topbar">
      <button id="menuBtn" class="btn icon only-mobile" title="Sessions">☰</button>
      <div class="title">
        <span id="curName">—</span>
        <span id="curAgent" class="agent-tag"></span>
        <span id="curStatus" class="status"></span>
      </div>
      <div class="spacer"></div>
      <button id="filesBtn" class="btn icon" title="Files">🗂 <span id="filesCount">0</span></button>
      <button id="modeBtn" class="btn" title="Toggle terminal">⌨ Terminal</button>
      <button id="renameBtn" class="btn icon" title="Rename session">✎</button>
      <button id="killBtn" class="btn danger icon" title="Kill session">✕</button>
    </header>

    <section id="chatWrap" class="pane">
      <div id="chat"></div>
      <form id="promptForm">
        <textarea id="promptInput" rows="1" placeholder="Type a prompt…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="sendBtn" class="btn primary" type="submit">Send</button>
      </form>
    </section>

    <section id="termWrap" class="pane hidden">
      <div id="term"></div>
    </section>
  </main>

  <aside id="filesPanel" class="drawer hidden">
    <div class="drawer-head">
      <b>Files changed / generated</b>
      <button id="filesClose" class="btn icon">✕</button>
    </div>
    <ul id="filesList"></ul>
  </aside>

  <div id="preview" class="modal hidden">
    <div class="modal-box" id="previewBox">
      <div class="modal-head">
        <b id="previewName">file</b>
        <span class="head-actions">
          <button id="previewRender" class="btn hidden" title="Toggle rendered / source">Rendered</button>
          <button id="previewExpand" class="btn icon" title="Expand">⛶</button>
          <a id="previewOpen" class="btn icon" title="Open raw" target="_blank">↗</a>
          <button id="previewClose" class="btn icon">✕</button>
        </span>
      </div>
      <div id="previewBody"></div>
    </div>
  </div>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head">
        <b>Settings — agents</b>
        <span class="head-actions">
          <button id="settingsAdd" class="btn">＋ Agent</button>
          <button id="settingsSave" class="btn primary">Save</button>
          <button id="settingsClose" class="btn icon">✕</button>
        </span>
      </div>
      <div id="settingsBody"></div>
    </div>
  </div>

  <div id="newModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><b id="newTitle">New session — pick an agent</b><button id="newClose" class="btn icon">✕</button></div>
      <div id="newBody"></div>
    </div>
  </div>

  <div id="rail-scrim" class="scrim hidden"></div>
</div>

<script src="/static/vendor/xterm.js"></script>
<script src="/static/vendor/addon-fit.js"></script>
<script src="/static/vendor/highlight.min.js"></script>
<script type="module" src="/static/vendor/model-viewer.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
