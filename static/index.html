<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111417">
<title>RemoteCode</title>
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RemoteCode">
<link rel="stylesheet" href="/static/vendor/xterm.css">
<link rel="stylesheet" href="/static/vendor/hljs-dark.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <aside id="rail">
    <div class="rail-head">
      <span class="brand">◆ RemoteCode</span>
      <button id="settingsBtn" class="btn icon" title="Settings">⚙</button>
      <button id="newBtn" class="btn primary" title="New session">＋</button>
    </div>
    <ul id="sessionList"></ul>
    <div class="rail-foot" id="railFoot">no sessions yet</div>
  </aside>

  <main id="main">
    <header id="topbar">
      <button id="menuBtn" class="btn icon only-mobile" title="Sessions">☰</button>
      <div class="title">
        <span id="curName">—</span>
        <span id="curAgent" class="agent-tag"></span>
        <span id="curStatus" class="status"></span>
      </div>
      <div class="spacer"></div>
      <button id="filesBtn" class="btn icon" title="Files">🗂 <span id="filesCount">0</span></button>
      <button id="modeBtn" class="btn" title="Toggle terminal">⌨ Terminal</button>
      <button id="renameBtn" class="btn icon" title="Rename session">✎</button>
      <button id="killBtn" class="btn danger icon" title="Kill session">✕</button>
    </header>

    <section id="chatWrap" class="pane">
      <div id="chat"></div>
      <div id="claudeBar" class="claude-bar hidden">
        <label class="cb-group">
          <span class="cb-lbl">Model</span>
          <select id="modelSel">
            <option value="default">Default</option>
            <option value="sonnet">Sonnet</option>
            <option value="opus">Opus</option>
            <option value="opusplan">Opus Plan</option>
            <option value="haiku">Haiku</option>
            <option value="fable">Fable</option>
          </select>
        </label>
        <div class="cb-group">
          <span class="cb-lbl">Mode</span>
          <div id="modeSeg" class="seg">
            <button type="button" class="seg-btn" data-mode="default">Manual</button>
            <button type="button" class="seg-btn" data-mode="acceptEdits">Accept edits</button>
            <button type="button" class="seg-btn" data-mode="plan">Plan</button>
            <button type="button" class="seg-btn" data-mode="auto">Auto</button>
          </div>
        </div>
        <span id="cbMsg" class="cb-msg"></span>
      </div>
      <div id="selCard" class="selcard hidden"></div>
      <div id="chatKeys" class="keybar chatkeys hidden">
        <button type="button" data-k="up">↑</button>
        <button type="button" data-k="down">↓</button>
        <button type="button" data-k="enter">⏎ Enter</button>
        <button type="button" data-k="esc">Esc</button>
        <button type="button" data-k="ctrlc">^C</button>
      </div>
      <div id="attachBar" class="attachbar hidden"></div>
      <form id="promptForm">
        <button type="button" id="attachBtn" class="btn icon" title="Attach files">📎</button>
        <input type="file" id="fileInput" multiple hidden>
        <textarea id="promptInput" rows="1" placeholder="Type a prompt…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="sendBtn" class="btn primary" type="submit">Send</button>
      </form>
    </section>

    <section id="termWrap" class="pane hidden">
      <div id="term"></div>
      <div id="termKeys" class="keybar">
        <button type="button" data-k="esc">Esc</button>
        <button type="button" data-k="tab">⇥</button>
        <button type="button" data-k="up">↑</button>
        <button type="button" data-k="down">↓</button>
        <button type="button" data-k="left">←</button>
        <button type="button" data-k="right">→</button>
        <button type="button" data-k="enter">⏎</button>
        <button type="button" data-k="ctrlc">^C</button>
      </div>
    </section>
  </main>

  <aside id="filesPanel" class="sidepanel hidden">
    <div class="sp-head">
      <b>Files changed / generated <span id="filesCountBadge" class="sp-count">0</span></b>
      <span class="sp-actions">
        <button id="spExpand" class="btn icon" title="Widen panel">⤢</button>
        <button id="filesClose" class="btn icon" title="Close panel">✕</button>
      </span>
    </div>
    <ul id="filesList"></ul>
    <div id="spPreview" class="sp-preview hidden">
      <div class="sp-pv-head">
        <button id="pvBack" class="btn icon" title="Back to files">←</button>
        <b id="previewName">file</b>
        <span class="head-actions">
          <button id="previewRender" class="btn hidden" title="Toggle rendered / source">Rendered</button>
          <a id="previewOpen" class="btn icon" title="Open raw" target="_blank">↗</a>
        </span>
      </div>
      <div id="previewBody"></div>
    </div>
  </aside>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head">
        <b>Settings — agents</b>
        <span class="head-actions">
          <button id="settingsAdd" class="btn">＋ Agent</button>
          <button id="settingsSave" class="btn primary">Save</button>
          <button id="settingsClose" class="btn icon">✕</button>
        </span>
      </div>
      <div id="settingsBody"></div>
    </div>
  </div>

  <div id="newModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head"><b id="newTitle">New session — pick an agent</b><button id="newClose" class="btn icon">✕</button></div>
      <div id="newBody"></div>
    </div>
  </div>

  <div id="rail-scrim" class="scrim hidden"></div>
</div>

<script src="/static/vendor/xterm.js"></script>
<script src="/static/vendor/addon-fit.js"></script>
<script src="/static/vendor/highlight.min.js"></script>
<script type="module" src="/static/vendor/model-viewer.min.js"></script>
<script src="/static/app.js"></script>
<script>
// Register the service worker for offline/instant loads. The worker itself is
// versioned server-side, so a new build auto-updates and re-syncs the cache.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').then(function (reg) {
      // When a new worker takes control (version bump), reload once so the running
      // page picks up the fresh assets instead of the ones it booted with.
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }).catch(function () { /* offline / unsupported — app still works online */ });
  });
}
</script>
</body>
</html>
